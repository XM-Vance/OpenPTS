# PTIS 生产级编排：Postgres 16 + Go 后端 + 文档解析服务 + Next.js 前端 + Nginx 反代。
#
# 启动：    docker compose up -d --build
#           （默认容器内多阶段构建，需能拉取 golang:1.25-alpine / node:20-alpine 基础镜像）
# 迁移：    docker compose --profile migrate run --rm migrate up
# 种子：    docker compose exec backend /app/seed
# 日志：    docker compose logs -f backend
# 停服：    docker compose down                （保留卷）
# 完全清空：docker compose down -v             （删卷，慎用）
#
# 网络拓扑：
#   ┌─ nginx :80 ─┐
#   │   /api/* ─► backend:8080
#   │   其他   ─► frontend:3000
#   └─────────────┘
#   backend ─► postgres:5432, docling:8300
#   docling :8300 ─► postgres:5432, 智谱 GLM 视觉 API（文档 OCR）

services:
  postgres:
    image: postgres:16-alpine
    container_name: ptis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ptis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ptis}
      TZ: Asia/Shanghai
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ptis}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ptis]
    # 生产环境注释掉 ports：不对外暴露数据库端口

  # 按需运行：docker compose --profile migrate run --rm migrate up
  migrate:
    image: migrate/migrate:v4.17.0
    container_name: ptis-migrate
    profiles: [migrate]
    volumes:
      - ./db/migrations:/migrations
    networks: [ptis]
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - migrate
      - -path=/migrations
      - -database
      - postgres://${POSTGRES_USER:-ptis}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ptis}?sslmode=disable

  # 文档智能解析服务（PyMuPDF + 智谱 GLM 视觉 OCR）：上传文档→OCR→结构化→写 PG。
  # 需在 .env 配置 ZHIPU_API_KEY（智谱开放平台密钥）。
  docling:
    build:
      context: ./docling-service
    image: ptis-docling:latest
    container_name: ptis-docling
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      # 复用主库连接（写入自有表 docling_documents，启动时自动建表）
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${POSTGRES_DB:-ptis}
      PG_USER: ${POSTGRES_USER:-ptis}
      PG_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # 智谱 GLM 视觉 API 密钥（必填，仅来自 .env，不入仓库）
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:?ZHIPU_API_KEY must be set in .env}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      ZHIPU_VISION_MODEL: ${ZHIPU_VISION_MODEL:-glm-4v-flash}
      # DeepSeek 结构化提取（可选；配置后 extractor 优先用 DeepSeek，失败回退 GLM）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_TEXT_MODEL: ${DEEPSEEK_TEXT_MODEL:-deepseek-chat}
      ZHIPU_TEXT_MODEL: ${ZHIPU_TEXT_MODEL:-glm-4-flash}
      # 上传大小限制（字节，默认 10MB）
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [ptis]
    expose:
      - "8300"
    healthcheck:
      # 镜像已装 curl 并内置 HEALTHCHECK（见 docling-service/Dockerfile），
      # 此处仅复用间隔参数；test 走镜像内置的 curl 探活。
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ptis-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ptisadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    # 生产环境：不对外暴露任何 MinIO 端口，仅 docker 内部访问
    # 需要管理控制台时走 SSH 隧道或 nginx 子路径 + 鉴权
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ptis]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile   # 容器内多阶段构建（编译 server + seed）；离线环境见 docker-compose.local-build.yml
    image: ptis-backend:latest
    container_name: ptis-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-ptis}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ptis}?sslmode=disable
      DOCLING_SERVICE_URL: http://docling:8300
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-8}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-ptisadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-ptis}
      MINIO_USE_SSL: "false"
      TZ: Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [ptis]
    expose:
      - "8080"
    # R8: 健康检查（补充 compose 级别，覆盖 Dockerfile 的 HEALTHCHECK）
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile   # 容器内多阶段构建（npm ci + next build）；离线环境见 docker-compose.local-build.yml
    image: ptis-frontend:latest
    container_name: ptis-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
    depends_on:
      - backend
    networks: [ptis]
    # 仅容器内暴露：统一经 nginx :80 访问（与 docker-compose.win.yml 一致）。
    # 调试需直连时临时执行：docker compose port frontend 3000 或自行加 override。
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: ptis-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    networks: [ptis]

networks:
  ptis:
    driver: bridge

volumes:
  pg-data:
  minio-data:
