name: ✨ 功能建议
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请说明这个功能要解决什么问题。
        注意：OpenPTS 是通用运营框架，**算法/具体省份规则**由各部署方私有接入，
        相关提案请聚焦在「接口/契约/通用能力」上，而非具体算法实现。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能是为了解决什么场景下的什么痛点？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么做？有大致思路或参考实现最好。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有其他实现方式？为什么没选它们？
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: 影响模块
      options:
        - 后端 (Go 网关)
        - 前端 (Next.js)
        - 数据库 / 迁移
        - 文档解析 (docling)
        - 部署 / Docker
        - 文档
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: 边界确认
      description: 确认这个提案不涉及具体算法实现或具体省份规则数据
      options:
        - label: 我理解 OpenPTS 不含算法内核，本提案是通用能力/接口改进
          required: true
