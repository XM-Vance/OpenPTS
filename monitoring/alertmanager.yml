# Alertmanager 路由配置：按 severity 路由到不同接收器，含飞书与邮件。
# 飞书机器人 webhook 由本仓库附带的 alert-webhook-proxy 转译成飞书消息格式。
# 邮件接收器可选（需配置 SMTP）。

global:
  resolve_timeout: 5m
  smtp_from: '${SMTP_FROM:-alert@ptis.local}'
  smtp_smarthost: '${SMTP_HOST:-mail.ptis.local:25}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'
  smtp_require_tls: false

# 用通用模板美化通知
templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: default
  group_by: ['alertname', 'service']
  group_wait: 30s          # 同组首次告警等 30s 合并
  group_interval: 5m       # 同组追加告警间隔
  repeat_interval: 4h      # 已通知未恢复的重发周期
  routes:
    - matchers:
        - severity = "critical"
      receiver: feishu-critical
      continue: true       # 严重告警同时发邮件
    - matchers:
        - severity = "critical"
      receiver: email-ops
    - matchers:
        - severity = "warning"
      receiver: feishu-warning
    - matchers:
        - severity = "info"
      receiver: feishu-warning

receivers:
  - name: default
    # 默认空接收器（仅作兜底）
  - name: feishu-warning
    webhook_configs:
      - url: 'http://alert-webhook-proxy:8000/feishu/warning'
        send_resolved: true
  - name: feishu-critical
    webhook_configs:
      - url: 'http://alert-webhook-proxy:8000/feishu/critical'
        send_resolved: true
  - name: email-ops
    email_configs:
      - to: '${ALERT_EMAIL_TO:-ops@ptis.local}'
        send_resolved: true

inhibit_rules:
  # 整个服务 down 时不再发它的子告警
  - source_matchers:
      - alertname = "BackendDown"
    target_matchers:
      - service = "backend"
    equal: ['service']
