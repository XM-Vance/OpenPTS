# PTIS TLS 覆盖层：用 Caddy 替代 nginx，启用自动 HTTPS。
# 用法：docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# 必要环境变量（写到 .env）：
#   PTIS_DOMAIN=ptis.example.com
#   ACME_EMAIL=ops@example.com

services:
  # 关闭主 compose 中的 nginx（用 scale=0 而非删除，便于切回）
  nginx:
    scale: 0

  caddy:
    image: caddy:2.8-alpine
    container_name: ptis-caddy
    restart: unless-stopped
    environment:
      PTIS_DOMAIN: ${PTIS_DOMAIN:-:80}
      ACME_EMAIL:  ${ACME_EMAIL:-internal@ptis.local}
      TZ: Asia/Shanghai
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data        # 证书 + ACME 账户
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
    depends_on:
      - backend
      - frontend
    networks: [ptis]

volumes:
  caddy-data:
  caddy-config:
